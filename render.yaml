services:
  # ── API Server ──────────────────────────────────────────────────────────────
  - type: web
    name: ecocash-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/db run push &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: BOT_TOKEN
        sync: false        # Set manually in Render dashboard — do NOT commit the value
      - key: CHAT_ID
        sync: false        # Set manually in Render dashboard — do NOT commit the value
      - key: DATABASE_URL
        fromDatabase:
          name: ecocash-db
          property: connectionString

  # ── Frontend (Static Site) ──────────────────────────────────────────────────
  - type: web
    name: ecocash-frontend
    runtime: static
    plan: free
    rootDir: .
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/ecocash run build
    staticPublishPath: artifacts/ecocash/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ecocash-db
    plan: free
    databaseName: ecocash
    user: ecocash
